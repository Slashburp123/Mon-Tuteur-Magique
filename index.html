<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1035">
<title>Mon Tuteur Magique</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0c29;--bg2:#1a1545;--card:#231d5a;--card2:#2d2570;
  --purple:#7c5cbf;--purple-light:#a87fe8;--yellow:#ffd94a;--yellow-dark:#e6bc2a;
  --teal:#4ecdc4;--pink:#ff6b9d;--green:#6bcb77;
  --text:#f0eaff;--text-muted:#9b91cc;--border:rgba(255,255,255,0.08);
  --radius:20px;--radius-lg:28px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;height:100dvh;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,0.6) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 50% 10%,rgba(255,255,255,0.7) 0%,transparent 100%),radial-gradient(1px 1px at 70% 30%,rgba(255,255,255,0.5) 0%,transparent 100%),radial-gradient(1px 1px at 35% 70%,rgba(255,255,255,0.6) 0%,transparent 100%),radial-gradient(1px 1px at 85% 60%,rgba(255,255,255,0.4) 0%,transparent 100%),radial-gradient(1px 1px at 5% 80%,rgba(255,255,255,0.5) 0%,transparent 100%);pointer-events:none;z-index:0;}
 
/* MAIN SCREEN */
.app{display:flex;flex-direction:column;height:100%;position:relative;z-index:1;}
 
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;flex-shrink:0;background:rgba(15,12,41,0.6);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);}
.profile-btn{background:rgba(255,255,255,0.08);border:none;border-radius:10px;color:var(--text-muted);font-size:13px;font-weight:700;padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.top-center{display:flex;align-items:center;gap:8px;}
.top-avatar{font-size:26px;}
.top-name{font-weight:800;font-size:15px;color:var(--text);}
.top-grade{font-size:11px;color:var(--text-muted);}
.stars-badge{background:rgba(255,217,74,0.15);border:1px solid rgba(255,217,74,0.3);border-radius:20px;padding:5px 12px;font-size:13px;font-weight:700;color:var(--yellow);}
 
.subject-bar{display:flex;gap:8px;padding:10px 14px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.subject-bar::-webkit-scrollbar{display:none;}
.sub-chip{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--text-muted);white-space:nowrap;cursor:pointer;transition:all 0.2s;flex-shrink:0;}
.sub-chip:active{background:var(--purple);border-color:var(--purple-light);color:#fff;}
 
.messages-area{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.1) transparent;}
.msg-row{display:flex;align-items:flex-end;gap:8px;}
.msg-row.user{flex-direction:row-reverse;}
.msg-avatar{font-size:24px;flex-shrink:0;margin-bottom:2px;}
.bubble{max-width:75%;padding:11px 15px;border-radius:20px;font-size:15px;line-height:1.5;font-weight:600;}
.msg-row.bot .bubble{background:var(--card2);color:var(--text);border-bottom-left-radius:6px;}
.msg-row.user .bubble{background:var(--purple);color:#fff;border-bottom-right-radius:6px;}
.typing-dots{display:flex;gap:5px;align-items:center;padding:4px 2px;}
.td{width:7px;height:7px;border-radius:50%;background:var(--text-muted);animation:tdBounce 1s infinite;}
.td:nth-child(2){animation-delay:0.15s;}
.td:nth-child(3){animation-delay:0.3s;}
@keyframes tdBounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
 
.voice-panel{flex-shrink:0;background:var(--bg2);border-top:1px solid var(--border);padding:14px 16px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;}
.transcript-box{width:100%;min-height:28px;background:rgba(255,255,255,0.04);border-radius:12px;padding:7px 14px;font-size:13px;color:var(--text-muted);font-style:italic;text-align:center;}
.voice-controls{display:flex;align-items:center;gap:16px;}
.mic-btn{width:70px;height:70px;border-radius:50%;border:3px solid var(--purple-light);background:var(--card);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;}
.mic-btn:active{transform:scale(0.93);}
.mic-btn.listening{border-color:var(--pink);background:rgba(255,107,157,0.15);animation:micPulse 1.1s ease-in-out infinite;}
.mic-btn.speaking{border-color:var(--teal);background:rgba(78,205,196,0.12);}
.mic-btn svg{width:30px;height:30px;}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,157,0.4);}50%{box-shadow:0 0 0 12px rgba(255,107,157,0);}}
.status-txt{font-size:13px;font-weight:700;color:var(--text-muted);text-align:center;min-height:18px;}
.status-txt.listening{color:var(--pink);}
.status-txt.speaking{color:var(--teal);}
.text-row{display:flex;gap:8px;width:100%;}
.text-input{flex:1;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:24px;padding:10px 16px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--text);outline:none;}
.text-input:focus{border-color:var(--purple-light);}
.text-input::placeholder{color:var(--text-muted);font-weight:400;}
.send-btn{background:var(--purple);border:none;border-radius:24px;padding:10px 18px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;color:#fff;cursor:pointer;}
.send-btn:active{background:var(--card2);}
 
/* PROFILE PICKER */
.picker-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(15,12,41,0.93);align-items:center;justify-content:center;flex-direction:column;gap:20px;}
.picker-overlay.show{display:flex;}
.picker-title{font-family:'Fredoka One',cursive;font-size:26px;color:var(--yellow);text-align:center;}
.picker-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:280px;}
.picker-card{background:var(--card);border:2px solid var(--purple);border-radius:var(--radius);padding:20px 10px;text-align:center;cursor:pointer;transition:all 0.2s;}
.picker-card:active{transform:scale(0.96);border-color:var(--yellow);}
.picker-emoji{font-size:40px;}
.picker-name{font-family:'Fredoka One',cursive;font-size:16px;color:var(--text);margin-top:6px;}
.picker-grade{font-size:12px;color:var(--text-muted);}
 
/* REWARD */
.reward-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(15,12,41,0.88);align-items:center;justify-content:center;flex-direction:column;gap:12px;}
.reward-overlay.show{display:flex;}
.reward-emoji{font-size:72px;animation:bigBounce 0.5s ease;}
.reward-text{font-family:'Fredoka One',cursive;font-size:28px;color:var(--yellow);text-align:center;}
.reward-sub{font-size:15px;color:var(--text-muted);text-align:center;}
.reward-close{margin-top:8px;background:var(--yellow);color:#1a1035;border:none;border-radius:20px;padding:12px 32px;font-family:'Fredoka One',cursive;font-size:18px;cursor:pointer;}
@keyframes bigBounce{0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
</style>
</head>
<body>
 
<!-- MAIN APP -->
<div class="app">
  <div class="top-bar">
    <button class="profile-btn" onclick="showPicker()">☰ Profil</button>
    <div class="top-center">
      <span class="top-avatar" id="topAvatar">🐰</span>
      <div>
        <div class="top-name" id="topName">Profil Lapin</div>
        <div class="top-grade" id="topGrade">1re année</div>
      </div>
    </div>
    <div class="stars-badge" id="starsBadge">⭐ 0</div>
  </div>
 
  <div class="subject-bar" id="subjectBar"></div>
 
  <div class="messages-area" id="messages"></div>
 
  <div class="voice-panel">
    <div class="transcript-box" id="transcriptBox">Appuie sur le micro pour parler...</div>
    <div class="voice-controls">
      <div style="text-align:center">
        <button class="mic-btn" id="micBtn" onclick="toggleMic()">
          <svg viewBox="0 0 24 24" fill="none">
            <rect x="8.5" y="2" width="7" height="12" rx="3.5" fill="white"/>
            <path d="M5 11a7 7 0 0 0 14 0" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
            <line x1="12" y1="18" x2="12" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <line x1="9" y1="22" x2="15" y2="22" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <div class="status-txt" id="statusTxt">Appuie pour parler</div>
      </div>
    </div>
    <div class="text-row">
      <input class="text-input" id="textInput" placeholder="Ou écris ta question..." onkeydown="if(event.key==='Enter'){sendText()}" />
      <button class="send-btn" onclick="sendText()">Envoyer</button>
    </div>
  </div>
</div>
 
<!-- PROFILE PICKER -->
<div class="picker-overlay" id="pickerOverlay">
  <div class="picker-title">Choisir un profil</div>
  <div class="picker-grid">
    <div class="picker-card" onclick="switchProfile(0)">
      <div class="picker-emoji">🐰</div>
      <div class="picker-name">Lapin</div>
      <div class="picker-grade">1re année · 6–7 ans</div>
    </div>
    <div class="picker-card" onclick="switchProfile(1)">
      <div class="picker-emoji">🦊</div>
      <div class="picker-name">Renard</div>
      <div class="picker-grade">3e année · 8–9 ans</div>
    </div>
  </div>
</div>
 
<!-- REWARD -->
<div class="reward-overlay" id="rewardOverlay">
  <div class="reward-emoji" id="rewardEmoji">🌟</div>
  <div class="reward-text" id="rewardText">Super étoile!</div>
  <div class="reward-sub" id="rewardSub">Tu travailles vraiment fort!</div>
  <button class="reward-close" onclick="document.getElementById('rewardOverlay').classList.remove('show')">Continuer!</button>
</div>
 
<script>
// ── CLÉS API ──
const ANTHROPIC_KEY = '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';
const ELEVEN_KEY = 'ceb68b404cc499ef2d5f68d3c5913b516333075948d198968e70261649127f45';
 
const PROFILES = [
  {
    name:'Profil Lapin', grade:'1re année', avatar:'🐰',
    subjects:['Lecture','Écriture','Maths','Sons & lettres'],
    voice_id:'cgSgspJ2msm6clMCkdW9',
    system:`Tu es un tuteur doux et patient pour un enfant de 6-7 ans en 1re année au Québec.
Parle TOUJOURS en français québécois simple et chaleureux.
Phrases très courtes, maximum 2-3 phrases par réponse.
Utilise des mots très simples qu'un enfant de 6 ans comprend.
Beaucoup d'encouragements: "Super!", "Bravo!", "Excellent!", "C'est vraiment bien!"
Pour les maths, utilise des objets concrets (pommes, bonbons, jouets).
Pose UNE seule question à la fois.
Tu t'appelles Étoile, le tuteur magique. Ne dis jamais que tu es une IA.`
  },
  {
    name:'Profil Renard', grade:'3e année', avatar:'🦊',
    subjects:['Lecture','Écriture','Maths','Sciences','Univers social'],
    voice_id:'cgSgspJ2msm6clMCkdW9',
    system:`Tu es un tuteur patient et motivant pour un enfant de 8-9 ans en 3e année au Québec.
Parle TOUJOURS en français québécois, de façon amicale et dynamique.
Réponses courtes (3-4 phrases max).
Utilise des analogies avec la vie de tous les jours.
Encourage l'effort: "Tu travailles vraiment fort!", "Je suis fier de toi!"
Décompose les problèmes difficiles en petites étapes.
Tu t'appelles Étoile, le tuteur magique. Ne dis jamais que tu es une IA.`
  }
];
 
const REWARDS = [
  {emoji:'🌟',text:'Super étoile!',sub:'Tu es vraiment brillant!'},
  {emoji:'🎉',text:'Bravo bravo!',sub:'Continue comme ça!'},
  {emoji:'🏆',text:'Champion!',sub:'Tu travailles très fort!'},
  {emoji:'🦸',text:'Super héros!',sub:'Rien ne t\'arrête!'},
  {emoji:'🎯',text:'En plein dans le mille!',sub:'Tu poses de super questions!'},
];
 
let currentProfile = PROFILES[0];
let history = [];
let stars = 0;
let msgCount = 0;
let isListening = false;
let isSpeaking = false;
let recognition = null;
let currentAudio = null;
 
function showPicker() {
  stopListening();
  stopAudio();
  document.getElementById('pickerOverlay').classList.add('show');
}
 
function switchProfile(idx) {
  document.getElementById('pickerOverlay').classList.remove('show');
  currentProfile = PROFILES[idx];
  history = [];
  stars = 0;
  msgCount = 0;
  document.getElementById('topAvatar').textContent = currentProfile.avatar;
  document.getElementById('topName').textContent = currentProfile.name;
  document.getElementById('topGrade').textContent = currentProfile.grade;
  document.getElementById('starsBadge').textContent = '⭐ 0';
  document.getElementById('subjectBar').innerHTML = currentProfile.subjects
    .map(s => `<span class="sub-chip" onclick="sendMessage('Je veux pratiquer: ${s}')">${s}</span>`).join('');
  document.getElementById('messages').innerHTML = '';
  const greet = idx === 0
    ? 'Salut! Je m\'appelle Étoile, ton tuteur magique! 🌟 Sur quoi tu veux travailler aujourd\'hui?'
    : 'Bonjour! Je suis Étoile, ton tuteur! 🦊 Qu\'est-ce qu\'on pratique aujourd\'hui?';
  addBotMsg(greet);
  speakElevenLabs(greet);
}
 
function addBotMsg(text) {
  const el = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg-row bot';
  d.innerHTML = `<span class="msg-avatar">${currentProfile.avatar}</span><div class="bubble">${text}</div>`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}
 
function addUserMsg(text) {
  const el = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg-row user';
  d.innerHTML = `<div class="bubble">${text}</div><span class="msg-avatar">🧒</span>`;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
}
 
function addTyping() {
  const el = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg-row bot'; d.id = 'typing';
  d.innerHTML = `<span class="msg-avatar">${currentProfile.avatar}</span><div class="bubble"><div class="typing-dots"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>`;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}
function removeTyping() { const t=document.getElementById('typing'); if(t) t.remove(); }
 
function setStatus(txt, cls) {
  const el = document.getElementById('statusTxt');
  el.textContent = txt;
  el.className = 'status-txt' + (cls ? ' '+cls : '');
}
 
async function sendMessage(text) {
  if (!text.trim()) return;
  stopAudio();
  addUserMsg(text);
  history.push({role:'user', content:text});
  addTyping();
  setStatus('Étoile réfléchit...', '');
 
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key': ANTHROPIC_KEY,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:300,
        system: currentProfile.system,
        messages: history
      })
    });
    const data = await res.json();
    removeTyping();
    if (data.error) {
      const e = 'Oups! Problème de connexion. Vérifie ta connexion internet.';
      addBotMsg(e); speakElevenLabs(e); return;
    }
    const reply = data.content?.[0]?.text || 'Je n\'ai pas compris. Peux-tu répéter?';
    history.push({role:'assistant', content:reply});
    addBotMsg(reply);
    await speakElevenLabs(reply);
    msgCount++; stars++;
    document.getElementById('starsBadge').textContent = `⭐ ${stars}`;
    if (msgCount % 5 === 0) {
      const r = REWARDS[Math.floor(Math.random()*REWARDS.length)];
      document.getElementById('rewardEmoji').textContent = r.emoji;
      document.getElementById('rewardText').textContent = r.text;
      document.getElementById('rewardSub').textContent = r.sub;
      document.getElementById('rewardOverlay').classList.add('show');
    }
  } catch(e) {
    removeTyping();
    addBotMsg('Je ne peux pas me connecter. Vérifie ta connexion internet.');
    setStatus('Appuie pour parler', '');
  }
}
 
function sendText() {
  const val = document.getElementById('textInput').value.trim();
  if (val) { document.getElementById('textInput').value=''; sendMessage(val); }
}
 
async function speakElevenLabs(text) {
  setStatus('Étoile parle... 🔊', 'speaking');
  document.getElementById('micBtn').className = 'mic-btn speaking';
  isSpeaking = true;
  const clean = text.replace(/[\u{1F300}-\u{1FFFF}]/gu,'').replace(/[⭐🌟✨]/g,'').trim();
  try {
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${currentProfile.voice_id}`, {
      method:'POST',
      headers:{'Content-Type':'application/json','xi-api-key': ELEVEN_KEY},
      body: JSON.stringify({
        text: clean,
        model_id:'eleven_multilingual_v2',
        voice_settings:{stability:0.55,similarity_boost:0.80,style:0.25,use_speaker_boost:true}
      })
    });
    if (!res.ok) { stopAudio(); return; }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    currentAudio.onended = () => { isSpeaking=false; setStatus('Appuie pour parler',''); document.getElementById('micBtn').className='mic-btn'; URL.revokeObjectURL(url); };
    currentAudio.onerror = () => { stopAudio(); };
    await currentAudio.play();
  } catch(e) { stopAudio(); }
}
 
function stopAudio() {
  if (currentAudio) { try{currentAudio.pause();}catch(e){} currentAudio=null; }
  isSpeaking=false;
  setStatus('Appuie pour parler','');
  document.getElementById('micBtn').className='mic-btn';
}
 
function toggleMic() {
  if (isSpeaking) { stopAudio(); return; }
  if (isListening) { stopListening(); return; }
  startListening();
}
 
function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus('Utilise le clavier — micro non supporté',''); return; }
  recognition = new SR();
  recognition.lang='fr-CA';
  recognition.continuous=false;
  recognition.interimResults=true;
  recognition.onstart = () => { isListening=true; document.getElementById('micBtn').className='mic-btn listening'; setStatus('Je t\'écoute... 👂','listening'); document.getElementById('transcriptBox').textContent='...'; };
  recognition.onresult = (e) => {
    const txt = Array.from(e.results).map(r=>r[0].transcript).join('');
    document.getElementById('transcriptBox').textContent = txt;
    if (e.results[e.results.length-1].isFinal) { stopListening(); if(txt.trim()) sendMessage(txt.trim()); }
  };
  recognition.onerror = (e) => {
    isListening=false; document.getElementById('micBtn').className='mic-btn';
    if (e.error==='not-allowed') setStatus('Autorise le micro dans Chrome','');
    else { setStatus('Appuie pour parler',''); document.getElementById('transcriptBox').textContent='Appuie sur le micro pour parler...'; }
  };
  recognition.onend = () => { isListening=false; document.getElementById('micBtn').className='mic-btn'; if(!isSpeaking) setStatus('Appuie pour parler',''); };
  recognition.start();
}
 
function stopListening() {
  if (recognition) { try{recognition.stop();}catch(e){} }
  isListening=false;
  document.getElementById('micBtn').className='mic-btn';
  setStatus('Appuie pour parler','');
}
 
// Démarrage automatique
window.onload = () => {
  switchProfile(0);
};
</script>
</body>
</html>
